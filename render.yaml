services:
  # ── Backend Web Service ───────────────────────────────────────────────────────
  - type: web
    name: reelpick-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: TMDB_BEARER
        sync: false   # set manually in Render dashboard
      - key: TMDB_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: reelpick-redis
          property: connectionString
      - key: CLIENT_ORIGIN
        sync: false   # set to your Vercel frontend URL

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: reelpick-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
