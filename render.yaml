services:
  - type: web
    name: reelpick-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://reelpick-584c5.web.app
